name: Issues
on:
  issues:
    types: [opened, reopened]

jobs:
  parse-issue:
    runs-on: ubuntu-latest
    outputs:
      iscustom: ${{ steps.parse.outputs.iscustom }}
      branch: ${{ steps.parse.outputs.branch }}
      image: ${{ steps.parse.outputs.image }}
      device: ${{ steps.parse.outputs.device }}
      version: ${{ steps.parse.outputs.version }}
      rootfs_partsize: ${{ steps.parse.outputs.rootfs_partsize }}
      network_lan: ${{ steps.parse.outputs.network_lan }}
      docker: ${{ steps.parse.outputs.docker }}
      enable_pppoe: ${{ steps.parse.outputs.enable_pppoe }}
      pppoe_account: ${{ steps.parse.outputs.pppoe_account }}
      pppoe_password: ${{ steps.parse.outputs.pppoe_password }}
      packages: ${{ steps.parse.outputs.packages }}
      script: ${{ steps.parse.outputs.script }}
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Parse Issue Parameters
        id: parse
        shell: python
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          import json
          import os

          issuetitle = os.environ.get('ISSUE_TITLE', '')
          issuebody = os.environ.get('ISSUE_BODY', '')

          print("=== DEBUG INFO ===")
          print(f"Title: {issuetitle}")
          print(f"Body length: {len(issuebody)}")
          print(f"Body preview: {issuebody[:500]}")
          print("==================")

          iscustom = 'false'
          warinfo = 'false'

          fields = {
            "branch": "openwrt",
            "image": "",
            "device": "",
            "version": "",
            "rootfs_partsize": "256",
            "network_lan": "192.168.1.1",
            "docker": "false",
            "enable_pppoe": "false",
            "pppoe_account": "",
            "pppoe_password": "",
            "packages": "",
            "script": ""
          }

          try:
            if issuetitle.strip().lower().startswith('build'):
              json_str = issuebody.strip()
              
              if '```' in json_str:
                lines = json_str.split('\n')
                json_lines = []
                in_code_block = False
                for line in lines:
                  if line.strip().startswith('```'):
                    in_code_block = not in_code_block
                    continue
                  if in_code_block:
                    json_lines.append(line)
                json_str = '\n'.join(json_lines).strip()
              
              print(f"Extracted JSON: {json_str[:500]}")
              jsonbody = json.loads(json_str)
              iscustom = 'true'
              for k in fields:
                fields[k] = str(jsonbody.get(k, fields[k]))
              print(f"Parsed fields: {fields}")
          except Exception as e:
            print(f"Parse error: {e}")
            import traceback
            traceback.print_exc()

          if iscustom == 'false':
            if not any(x in issuebody for x in ['DMI', 'CPU', 'NIC']):
              warinfo = 'true'

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"iscustom={iscustom}\n")
            f.write(f"warinfo={warinfo}\n")
            for k, v in fields.items():
              if '\n' in v:
                f.write(f"{k}<<EOF\n{v}\nEOF\n")
              else:
                f.write(f"{k}={v}\n")

      - name: Update Comment Warinfo
        if: steps.parse.outputs.warinfo == 'true'
        uses: actions-cool/issues-helper@v3
        with:
          actions: "create-comment"
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          body: |
            请使用正确的格式提交构建请求。
            
            标题以 `build` 开头，内容为 JSON 格式，包含以下字段：
            ```json
            {
              "branch": "openwrt 或 immortalwrt",
              "image": "架构名称（如 x86_64）",
              "device": "设备型号（如 generic）",
              "version": "版本号",
              "rootfs_partsize": "分区大小(MB)",
              "network_lan": "LAN地址",
              "docker": "true 或 false",
              "enable_pppoe": "true 或 false",
              "pppoe_account": "PPPoE账号",
              "pppoe_password": "PPPoE密码",
              "packages": "插件包列表(可选)",
              "script": "自定义脚本(可选)"
            }
            ```
          emoji: heart

      - name: Update Comment Labels
        if: steps.parse.outputs.iscustom == 'true'
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'add-labels'
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          labels: 'build,${{ steps.parse.outputs.image }}-${{ steps.parse.outputs.device }}'

      - name: Update Comment Building
        if: steps.parse.outputs.iscustom == 'true'
        id: comment
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          body: |
            Hi @${{ github.event.issue.user.login }}.  
            Building ${{ steps.parse.outputs.branch }}-${{ steps.parse.outputs.image }}-${{ steps.parse.outputs.device }}-${{ steps.parse.outputs.version }} ...  
            > ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}  
            ----
          emoji: heart

  build:
    needs: parse-issue
    if: needs.parse-issue.outputs.iscustom == 'true'
    uses: 3wlh/Actions-ImageaBuilder/.github/workflows/Call_ImageBuilder_Issues.yml@main
    with:
      branch: ${{ needs.parse-issue.outputs.branch }}
      image: ${{ needs.parse-issue.outputs.image }}
      device: ${{ needs.parse-issue.outputs.device }}
      version: ${{ needs.parse-issue.outputs.version }}
      rootfs_partsize: ${{ needs.parse-issue.outputs.rootfs_partsize }}
      network_lan: ${{ needs.parse-issue.outputs.network_lan }}
      docker: ${{ needs.parse-issue.outputs.docker == 'true' }}
      enable_pppoe: ${{ needs.parse-issue.outputs.enable_pppoe == 'true' }}
      pppoe_account: ${{ needs.parse-issue.outputs.pppoe_account }}
      pppoe_password: ${{ needs.parse-issue.outputs.pppoe_password }}
      packages: ${{ needs.parse-issue.outputs.packages }}
      script: ${{ needs.parse-issue.outputs.script }}

  update-comment:
    needs: [parse-issue, build]
    if: always() && needs.parse-issue.outputs.iscustom == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Update Comment Success
        if: success()
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          body: |
            Hi @${{ github.event.issue.user.login }}.  
            Build ${{ needs.parse-issue.outputs.branch }}-${{ needs.parse-issue.outputs.image }}-${{ needs.parse-issue.outputs.device }}-${{ needs.parse-issue.outputs.version }} success!  
            Please check the artifacts: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}  
            ----
          emoji: hooray

      - name: Update Comment Fail
        if: failure()
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-comment'
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          body: |
            Hi @${{ github.event.issue.user.login }}.  
            Build ${{ needs.parse-issue.outputs.branch }}-${{ needs.parse-issue.outputs.image }}-${{ needs.parse-issue.outputs.device }}-${{ needs.parse-issue.outputs.version }} failed, please try again.  
            > ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}  
            ----
          emoji: confused

      - name: Close Issues
        if: needs.parse-issue.outputs.iscustom == 'true'
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issue'
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
